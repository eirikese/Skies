<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SkyCast PWA</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SkyCast">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; 
            background: var(--bg); color: var(--text); overflow: hidden;
        }
        #map { height: 40vh; width: 100%; border-bottom: 2px solid var(--accent); }
        #dashboard { height: 60vh; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        
        .loc-card {
            background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .data-source { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .source-live { background: #10b981; box-shadow: 0 0 8px #10b981; } /* Green = Current */
        .source-forecast { background: #f59e0b; } /* Orange = Forecast */
        
        .tabs { display: flex; gap: 10px; margin-top: 10px; }
        .tab-btn { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 5px 10px; border-radius: 5px; font-size: 12px;
        }
        .tab-btn.active { background: var(--accent); color: var(--bg); }
        
        canvas { max-height: 180px; margin-top: 10px; }
        
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: var(--bg); padding: 12px 24px;
            border-radius: 30px; font-weight: bold; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="dashboard">
    <div id="locations-list"></div>
</div>

<div id="controls" onclick="addCurrentLocation()">+ Add Pin Here</div>

<script>
    // --- CONFIG & STATE ---
    let map, markers = {};
    let locations = JSON.parse(localStorage.getItem('skycast_locations')) || [];
    let weatherCache = JSON.parse(localStorage.getItem('skycast_cache')) || {};

    // --- INITIALIZATION ---
    function init() {
        map = L.map('map', { zoomControl: false }).setView([59.91, 10.75], 5); // Default Norway
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        renderLocations();
        
        // Auto-refresh on open
        if (locations.length > 0) refreshAllWeather();
    }

    // --- CORE LOGIC ---
    async function fetchWeather(lat, lon) {
        const userAgent = "SkyCastPWA/1.0 (https://github.com/yourusername/repo)";
        const url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}`;
        
        try {
            const resp = await fetch(url, { headers: { 'User-Agent': userAgent } });
            const data = await resp.json();
            
            // Determine if data is "Current" (within 1 hour of now) or "Forecast"
            const latestTime = new Date(data.properties.timeseries[0].time);
            const isLive = Math.abs(new Date() - latestTime) < 3600000;

            return {
                data: data,
                timestamp: Date.now(),
                isLive: isLive
            };
        } catch (e) {
            console.error("Fetch failed", e);
            return null;
        }
    }

    async function addCurrentLocation() {
        const center = map.getCenter();
        const name = prompt("Name this location:", `Spot ${locations.length + 1}`);
        if (!name) return;

        const newLoc = { id: Date.now(), name, lat: center.lat, lon: center.lng };
        locations.push(newLoc);
        save();
        await refreshWeatherForLoc(newLoc);
        renderLocations();
    }

    async function refreshWeatherForLoc(loc) {
        const weather = await fetchWeather(loc.lat, loc.lon);
        if (weather) {
            weatherCache[loc.id] = weather;
            save();
            renderLocations();
        }
    }

    function refreshAllWeather() {
        locations.forEach(loc => refreshWeatherForLoc(loc));
    }

    function save() {
        localStorage.setItem('skycast_locations', JSON.stringify(locations));
        localStorage.setItem('skycast_cache', JSON.stringify(weatherCache));
    }

    // --- UI RENDERING ---
    function renderLocations() {
        const list = document.getElementById('locations-list');
        list.innerHTML = '';

        locations.forEach(loc => {
            const cache = weatherCache[loc.id];
            const div = document.createElement('div');
            div.className = 'loc-card';
            
            let weatherHTML = `<p>Loading weather...</p>`;
            if (cache) {
                const cur = cache.data.properties.timeseries[0].data.instant.details;
                weatherHTML = `
                    <div class="header-flex">
                        <strong>${loc.name}</strong>
                        <span>
                            <span class="data-source ${cache.isLive ? 'source-live' : 'source-forecast'}"></span>
                            ${cur.air_temperature}°C
                        </span>
                    </div>
                    <div class="tabs">
                        <button class="tab-btn active" onclick="drawChart(${loc.id}, 'hourly')">Hourly</button>
                        <button class="tab-btn" onclick="drawChart(${loc.id}, 'daily')">Daily</button>
                    </div>
                    <canvas id="chart-${loc.id}"></canvas>
                `;
            }

            div.innerHTML = weatherHTML;
            list.appendChild(div);
            if (cache) drawChart(loc.id, 'hourly');
            
            // Add/Update Map Marker
            if (!markers[loc.id]) {
                markers[loc.id] = L.marker([loc.lat, loc.lon]).addTo(map).bindPopup(loc.name);
            }
        });
    }

    function drawChart(locId, type) {
        const ctx = document.getElementById(`chart-${locId}`).getContext('2d');
        const cache = weatherCache[locId];
        if (!cache) return;

        const series = cache.data.properties.timeseries;
        let labels = [], temps = [];

        if (type === 'hourly') {
            series.slice(0, 24).forEach(s => {
                labels.push(new Date(s.time).getHours() + ":00");
                temps.push(s.data.instant.details.air_temperature);
            });
        } else {
            // Simple daily filter: pick 12:00 for each day
            series.filter(s => s.time.includes("T12:00:00Z")).forEach(s => {
                labels.push(new Date(s.time).toLocaleDateString(undefined, {weekday: 'short'}));
                temps.push(s.data.instant.details.air_temperature);
            });
        }

        // Destroy old chart if exists to prevent hover glitches
        if (window[`chartObj${locId}`]) window[`chartObj${locId}`].destroy();

        window[`chartObj${locId}`] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Temp (°C)',
                    data: temps,
                    borderColor: '#38bdf8',
                    tension: 0.3,
                    fill: false
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { grid: { color: '#334155' } }, x: { grid: { display: false } } }
            }
        });
    }

    init();
</script>
</body>
</html>

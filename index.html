<script>
/* =============================================
   STATE & PERSISTENCE
============================================= */
const STORE = 'skies_v5';
let locs = []; // [{id,name,lat,lng,cache:[]}]
let map, leafMarkers = {};
let placing = false;
let pending = null;
let detLocId = null;
let detMode = 'h';

function save() {
  try { localStorage.setItem(STORE, JSON.stringify(locs)); } catch(e) {}
}
function load() {
  try { const d = localStorage.getItem(STORE); if (d) locs = JSON.parse(d); } catch(e) {}
}

/* =============================================
   INIT
============================================= */
window.addEventListener('DOMContentLoaded', function() {
  load();
  initMap();
  renderLocs();
  // Auto-sync on open
  if (locs.length) syncAll(true);
});

/* =============================================
   MAP
============================================= */
function initMap() {
  const center = locs.length ? [locs[0].lat, locs[0].lng] : [51.5, 0];
  const zoom = locs.length ? 7 : 3;

  map = L.map('leaflet-map', {
    center: center,
    zoom: zoom,
    zoomControl: false,
    attributionControl: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OSM'
  }).addTo(map);

  L.control.zoom({ position: 'topright' }).addTo(map);

  map.on('click', function(e) {
    if (!placing) return;
    pending = { lat: e.latlng.lat, lng: e.latlng.lng };
    document.getElementById('modal-coords').textContent =
      e.latlng.lat.toFixed(5) + ', ' + e.latlng.lng.toFixed(5);
    document.getElementById('loc-name').value = '';
    openModal();
  });

  locs.forEach(addMarker);
}

function makeIcon(loc) {
  return L.divIcon({
    className: '',
    html: '<div class="wm-wrap"><div class="wm-inner">' + weatherEmoji(loc) + '</div></div>',
    iconSize: [36, 36],
    iconAnchor: [18, 34],
    popupAnchor: [0, -36]
  });
}

function addMarker(loc) {
  var m = L.marker([loc.lat, loc.lng], { icon: makeIcon(loc) }).addTo(map);
  m.on('click', function() { openDetail(loc.id); });
  var temp = latestTemp(loc);
  m.bindPopup(
    '<div class="pu-name">' + esc(loc.name) + '</div>' +
    '<div class="pu-temp">' + (temp !== null ? temp + '°C' : '—') + '</div>' +
    '<div class="pu-meta">' + loc.lat.toFixed(4) + ', ' + loc.lng.toFixed(4) + '</div>'
  );
  leafMarkers[loc.id] = m;
}

function refreshMarker(loc) {
  if (!leafMarkers[loc.id]) return;
  leafMarkers[loc.id].setIcon(makeIcon(loc));
  var temp = latestTemp(loc);
  leafMarkers[loc.id].setPopupContent(
    '<div class="pu-name">' + esc(loc.name) + '</div>' +
    '<div class="pu-temp">' + (temp !== null ? temp + '°C' : '—') + '</div>' +
    '<div class="pu-meta">' + loc.lat.toFixed(4) + ', ' + loc.lng.toFixed(4) + '</div>'
  );
}

/* =============================================
   MODAL
============================================= */
function openModal() {
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(function() { document.getElementById('loc-name').focus(); }, 320);
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  pending = null;
  stopPin();
}
function bgClose(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

document.getElementById('loc-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') confirmPin();
});

function confirmPin() {
  var name = document.getElementById('loc-name').value.trim();
  if (!name) { toast('Enter a name first'); return; }
  if (!pending) return;
  var loc = { id: '' + Date.now(), name: name, lat: pending.lat, lng: pending.lng, cache: [] };
  locs.push(loc);
  save();
  closeModal();
  addMarker(loc);
  renderLocs();
  toast('Fetching weather for ' + name + '…');
  fetchWeather(loc).then(function() { renderLocs(); refreshMarker(loc); });
  switchTabById('locs-view');
}

/* =============================================
   FETCH — Met.no Locationforecast 2.0
============================================= */
async function fetchWeather(loc) {
  var url = 'https://api.met.no/weatherapi/locationforecast/2.0/complete?lat='
    + loc.lat.toFixed(4) + '&lon=' + loc.lng.toFixed(4);
  try {
    var r = await fetch(url, {
      headers: { 'User-Agent': 'Skies-WeatherApp/1.0 contact@example.com' }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    ingestWeather(loc, data);
    save();
    return true;
  } catch(e) {
    console.error('fetch failed', loc.name, e);
    toast('Failed: ' + loc.name);
    return false;
  }
}

function ingestWeather(loc, data) {
  var ts = (data.properties && data.properties.timeseries) ? data.properties.timeseries : [];
  var now = new Date();
  var snapshot = {
    at: Date.now(),
    rows: ts.slice(0, 180).map(function(t) {
      var dt = new Date(t.time);
      var diffH = (dt - now) / 3600000;
      var isMeasured = diffH >= -1 && diffH <= 3; // within window of "current"
      var inst = (t.data && t.data.instant && t.data.instant.details) || {};
      var n1 = t.data && t.data.next_1_hours;
      var n6 = t.data && t.data.next_6_hours;
      var n12 = t.data && t.data.next_12_hours;
      var next = n1 || n6 || n12 || {};
      var sym = (next.summary && next.summary.symbol_code) || '';
      var prec = (next.details && next.details.precipitation_amount) || 0;
      return {
        time: t.time,
        type: isMeasured ? 'm' : 'f',
        temp: inst.air_temperature,
        wind: inst.wind_speed,
        wd: inst.wind_from_direction,
        rh: inst.relative_humidity,
        pres: inst.air_pressure_at_sea_level,
        cloud: inst.cloud_area_fraction,
        sym: sym,
        prec: prec
      };
    })
  };
  loc.cache = loc.cache || [];
  loc.cache.push(snapshot);
  if (loc.cache.length > 40) loc.cache = loc.cache.slice(-40);
}

async function syncAll(silent) {
  if (!locs.length) return;
  var btn = document.getElementById('sync-btn');
  btn.classList.add('spinning');
  if (!silent) toast('Syncing all locations…');
  await Promise.all(locs.map(fetchWeather));
  btn.classList.remove('spinning');
  renderLocs();
  locs.forEach(refreshMarker);
  if (!silent) toast('All updated ✓');
}

/* =============================================
   TABS
============================================= */
function switchTab(el) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('on'); });
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('on'); });
  el.classList.add('on');
  var v = document.getElementById(el.getAttribute('data-v'));
  if (v) v.classList.add('on');
  if (el.getAttribute('data-v') === 'map-view') {
    setTimeout(function() { if (map) map.invalidateSize(); }, 50);
  }
}

function switchTabById(id) {
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('on', t.getAttribute('data-v') === id);
  });
  document.querySelectorAll('.view').forEach(function(v) {
    v.classList.toggle('on', v.id === id);
  });
}

/* =============================================
   RENDER LOCATIONS
============================================= */
function renderLocs() {
  var el = document.getElementById('locs-list');
  if (!locs.length) {
    el.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">🗺️</div>' +
        '<div class="empty-title">No locations yet</div>' +
        '<div class="empty-sub">Go to the Map tab and tap<br>"+ Add Location", then tap<br>anywhere on the globe.</div>' +
      '</div>';
    return;
  }

  el.innerHTML = locs.map(function(loc) {
    var snap = lastSnap(loc);
    var row = snap && snap.rows && snap.rows.length ? snap.rows[0] : null;
    var temp = row && row.temp !== undefined ? Math.round(row.temp) : null;
    var wind = row && row.wind !== undefined ? row.wind.toFixed(1) : null;
    var rh = row && row.rh !== undefined ? Math.round(row.rh) : null;
    var prec = row && row.prec !== undefined ? row.prec.toFixed(1) : null;
    var dtype = row ? row.type : 'f';
    var emoji = row ? symEmoji(row.sym) : '📍';

    var statsHtml = '';
    if (snap) {
      if (temp !== null) statsHtml +=
        '<div class="lc-stat">' +
          '<div class="lc-stat-label">Temp</div>' +
          '<div class="lc-stat-val"><div class="dot ' + dtype + '"></div>' + temp + '°C</div>' +
        '</div>';
      if (wind !== null) statsHtml +=
        '<div class="lc-stat">' +
          '<div class="lc-stat-label">Wind</div>' +
          '<div class="lc-stat-val">' + wind + ' m/s</div>' +
        '</div>';
      if (rh !== null) statsHtml +=
        '<div class="lc-stat">' +
          '<div class="lc-stat-label">Humidity</div>' +
          '<div class="lc-stat-val">' + rh + '%</div>' +
        '</div>';
      if (prec !== null) statsHtml +=
        '<div class="lc-stat">' +
          '<div class="lc-stat-label">Precip</div>' +
          '<div class="lc-stat-val">' + prec + 'mm</div>' +
        '</div>';
    }

    var footer = snap
      ? '<div class="dot ' + dtype + '"></div>' + timeSince(snap.at) + ' · ' + (dtype === 'm' ? 'measured' : 'forecast')
      : 'No data — tap to view';

    return '<div class="loc-card" onclick="openDetail(\'' + loc.id + '\')">' +
      '<div class="lc-top">' +
        '<div>' +
          '<div class="lc-name">' + emoji + ' ' + esc(loc.name) + '</div>' +
          '<div class="lc-coords">' + loc.lat.toFixed(4) + ', ' + loc.lng.toFixed(4) + '</div>' +
        '</div>' +
        '<div class="lc-del" onclick="event.stopPropagation();delLoc(\'' + loc.id + '\')">✕</div>' +
      '</div>' +
      (statsHtml ? '<div class="lc-stats">' + statsHtml + '</div>' : '') +
      '<div class="lc-footer">' + footer + '</div>' +
    '</div>';
  }).join('');
}

function delLoc(id) {
  if (!confirm('Remove this location?')) return;
  var loc = locs.find(function(l) { return l.id === id; });
  if (leafMarkers[id]) { leafMarkers[id].remove(); delete leafMarkers[id]; }
  locs = locs.filter(function(l) { return l.id !== id; });
  save();
  renderLocs();
  toast('Removed ' + (loc ? loc.name : 'location'));
}

/* =============================================
   DETAIL VIEW
============================================= */
function openDetail(id) {
  detLocId = id;
  detMode = 'h';
  document.querySelectorAll('.vt-btn').forEach(function(b, i) { b.classList.toggle('on', i === 0); });
  renderDetail();
  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  detLocId = null;
}

function setDV(mode, btn) {
  detMode = mode;
  document.querySelectorAll('.vt-btn').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  renderDetail();
}

function renderDetail() {
  var loc = locs.find(function(l) { return l.id === detLocId; });
  if (!loc) return;
  document.getElementById('det-title').textContent = loc.name;
  var body = document.getElementById('det-body');
  var snap = lastSnap(loc);

  if (!snap) {
    body.innerHTML = '<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-title">No data yet</div><div class="empty-sub">Use ↻ to sync weather data.</div></div>';
    return;
  }

  if (detMode === 'h') renderHourly(loc, snap, body);
  else if (detMode === 'd') renderDaily(loc, snap, body);
  else renderWeekly(loc, body);
}

/* ─── HOURLY ─── */
function renderHourly(loc, snap, body) {
  var rows = snap.rows.slice(0, 25);
  if (!rows.length) { body.innerHTML = nodata(); return; }

  var temps = rows.map(function(r) { return r.temp; }).filter(function(t) { return t !== undefined; });
  var minT = Math.min.apply(null, temps), maxT = Math.max.apply(null, temps);
  var winds = rows.map(function(r) { return r.wind; }).filter(function(w) { return w !== undefined; });
  var maxW = winds.length ? Math.max.apply(null, winds) : 10;

  body.innerHTML =
    chartSec('Temperature (°C)', svgLine(rows, 'temp', minT, maxT)) +
    chartSec('Wind Speed (m/s)', svgLine(rows, 'wind', 0, maxW + 2)) +
    chartSec('Precipitation (mm)', svgBars(rows)) +
    tableSec(rows.map(function(r) {
      return rowHtml(fmtTime(r.time), symEmoji(r.sym), r);
    }));
}

/* ─── DAILY ─── */
function renderDaily(loc, snap, body) {
  var byDay = {};
  snap.rows.forEach(function(r) {
    var day = r.time.slice(0, 10);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(r);
  });
  var dayKeys = Object.keys(byDay).slice(0, 7);
  if (!dayKeys.length) { body.innerHTML = nodata(); return; }

  var days = dayKeys.map(function(day) {
    var rs = byDay[day];
    var temps = rs.map(function(r) { return r.temp; }).filter(function(t) { return t !== undefined; });
    var winds = rs.map(function(r) { return r.wind; }).filter(function(w) { return w !== undefined; });
    var precs = rs.map(function(r) { return r.prec; }).filter(function(p) { return p !== undefined; });
    var types = rs.map(function(r) { return r.type; });
    var uniq = types.filter(function(v, i, a) { return a.indexOf(v) === i; });
    return {
      day: day,
      minT: temps.length ? Math.min.apply(null, temps) : null,
      maxT: temps.length ? Math.max.apply(null, temps) : null,
      avgW: winds.length ? winds.reduce(function(a, b) { return a + b; }, 0) / winds.length : null,
      totP: precs.reduce(function(a, b) { return a + b; }, 0),
      sym: rs[Math.floor(rs.length / 2)].sym,
      type: uniq.length > 1 ? 'x' : (uniq[0] || 'f')
    };
  });

  var allT = [];
  days.forEach(function(d) { if (d.minT !== null) allT.push(d.minT, d.maxT); });
  var minAll = Math.min.apply(null, allT), maxAll = Math.max.apply(null, allT);

  body.innerHTML =
    chartSec('Daily Temp Range (°C)', svgRange(days, minAll, maxAll)) +
    tableSec(days.map(function(d) {
      var r = {
        time: d.day + 'T12:00:00',
        type: d.type,
        temp: d.minT !== null ? Math.round(d.minT) + '–' + Math.round(d.maxT) + '°C' : '—',
        wind: d.avgW !== null ? d.avgW.toFixed(1) + ' m/s' : '—',
        prec: d.totP.toFixed(1) + 'mm',
        _raw: true
      };
      return rowHtmlDay(fmtDay(d.day), symEmoji(d.sym), r);
    }));
}

/* ─── WEEKLY ─── */
function renderWeekly(loc, body) {
  if (loc.cache.length < 1) {
    body.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Building history…</div><div class="empty-sub">Weekly trends accumulate as you<br>revisit the app over time.</div></div>';
    return;
  }

  var weeks = {};
  loc.cache.forEach(function(snap) {
    snap.rows.forEach(function(r) {
      var d = new Date(r.time);
      var ws = new Date(d);
      ws.setDate(d.getDate() - d.getDay());
      var key = ws.toISOString().slice(0, 10);
      if (!weeks[key]) weeks[key] = [];
      weeks[key].push(r);
    });
  });

  var wks = Object.keys(weeks).sort().slice(-8);
  if (!wks.length) { body.innerHTML = nodata(); return; }

  var wData = wks.map(function(wk) {
    var rs = weeks[wk];
    var temps = rs.map(function(r) { return r.temp; }).filter(function(t) { return t !== undefined; });
    var winds = rs.map(function(r) { return r.wind; }).filter(function(w) { return w !== undefined; });
    var precs = rs.map(function(r) { return r.prec; }).filter(function(p) { return p !== undefined; });
    var types = rs.map(function(r) { return r.type; });
    var uniq = types.filter(function(v, i, a) { return a.indexOf(v) === i; });
    return {
      wk: wk,
      avgT: temps.length ? temps.reduce(function(a, b) { return a + b; }, 0) / temps.length : null,
      minT: temps.length ? Math.min.apply(null, temps) : null,
      maxT: temps.length ? Math.max.apply(null, temps) : null,
      avgW: winds.length ? winds.reduce(function(a, b) { return a + b; }, 0) / winds.length : null,
      totP: precs.reduce(function(a, b) { return a + b; }, 0),
      type: uniq.length > 1 ? 'x' : (uniq[0] || 'f')
    };
  });

  var allT = [];
  wData.forEach(function(w) { if (w.minT !== null) allT.push(w.minT, w.maxT); });
  var minAll = allT.length ? Math.min.apply(null, allT) : 0;
  var maxAll = allT.length ? Math.max.apply(null, allT) : 20;

  body.innerHTML =
    chartSec('Weekly Avg Temp', svgWeekLine(wData, minAll, maxAll)) +
    tableSec(wData.map(function(w) {
      var r = {
        time: w.wk + 'T12:00:00',
        type: w.type,
        temp: w.avgT !== null ? Math.round(w.avgT) + '°C avg' : '—',
        wind: w.avgW !== null ? w.avgW.toFixed(1) + ' m/s' : '—',
        prec: w.totP.toFixed(1) + 'mm total',
        _raw: true
      };
      return rowHtmlDay('Wk ' + fmtShort(w.wk), '📅', r);
    }));
}

/* =============================================
   SVG CHARTS
============================================= */
var C = { W: 0, H: 110, pad: 12 };

function svgLine(rows, field, minV, maxV) {
  var n = rows.length;
  var W = Math.max(n * 34, 320);
  var H = C.H, pad = C.pad;
  var range = (maxV - minV) || 1;

  var pts = rows.map(function(r, i) {
    var v = r[field];
    var x = pad + (n > 1 ? i / (n - 1) : 0) * (W - pad * 2);
    var y = v !== undefined ? H - 20 - ((v - minV) / range) * (H - 20 - pad) : H / 2;
    return { x: x, y: y, type: r.type };
  });

  var path = pts.map(function(p, i) { return (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1); }).join(' ');
  var area = path + ' L' + pts[pts.length - 1].x.toFixed(1) + ',' + (H - 20) + ' L' + pts[0].x.toFixed(1) + ',' + (H - 20) + ' Z';

  var gid = 'g' + field + Math.random().toString(36).slice(2);
  var dots = pts.map(function(p) {
    var col = p.type === 'm' ? '#0ddba8' : '#3d8ef8';
    return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3" fill="' + col + '"/>';
  }).join('');

  var labels = pts.map(function(p, i) {
    return '<text x="' + p.x.toFixed(1) + '" y="' + (H - 4) + '" fill="#4a6080" font-size="9" text-anchor="middle" font-family="DM Mono,monospace">' + fmtTime(rows[i].time) + '</text>';
  }).filter(function(_, i) { return i % 3 === 0; }).join('');

  return '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' +
    '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3d8ef8" stop-opacity="0.25"/><stop offset="100%" stop-color="#3d8ef8" stop-opacity="0"/></linearGradient></defs>' +
    '<path d="' + area + '" fill="url(#' + gid + ')"/>' +
    '<path d="' + path + '" fill="none" stroke="#3d8ef8" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
    dots + labels + '</svg>';
}

function svgBars(rows) {
  var n = rows.length;
  var W = Math.max(n * 34, 320);
  var H = 80;
  var pad = 10;
  var maxP = Math.max.apply(null, rows.map(function(r) { return r.prec || 0; }).concat([0.5]));
  var bw = Math.max(6, (W - pad * 2) / n * 0.5);

  var bars = rows.map(function(r, i) {
    var x = pad + (i + 0.5) * ((W - pad * 2) / n) - bw / 2;
    var bh = ((r.prec || 0) / maxP) * (H - 22);
    var y = H - 16 - bh;
    var col = r.type === 'm' ? '#0ddba8' : '#3d8ef8';
    return '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + Math.max(bh, 0).toFixed(1) + '" fill="' + col + '" opacity="0.75" rx="2"/>';
  }).join('');

  var labels = rows.map(function(r, i) {
    var x = pad + (i + 0.5) * ((W - pad * 2) / n);
    return '<text x="' + x.toFixed(1) + '" y="' + (H - 2) + '" fill="#4a6080" font-size="9" text-anchor="middle" font-family="DM Mono,monospace">' + fmtTime(r.time) + '</text>';
  }).filter(function(_, i) { return i % 3 === 0; }).join('');

  return '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + bars + labels + '</svg>';
}

function svgRange(days, minAll, maxAll) {
  var n = days.length;
  var W = Math.max(n * 60, 280);
  var H = C.H, pad = C.pad;
  var range = (maxAll - minAll) || 1;

  var segs = days.map(function(d, i) {
    var x = pad + (i + 0.5) * ((W - pad * 2) / n);
    var y1 = d.maxT !== null ? H - 20 - ((d.maxT - minAll) / range) * (H - 20 - pad) : H / 2;
    var y2 = d.minT !== null ? H - 20 - ((d.minT - minAll) / range) * (H - 20 - pad) : H / 2;
    var col = d.type === 'x' ? '#9b79f5' : d.type === 'm' ? '#0ddba8' : '#3d8ef8';
    var lbl = new Date(d.day + 'T12:00:00').toLocaleDateString([], { weekday: 'short' });
    return '<line x1="' + x.toFixed(1) + '" y1="' + y1.toFixed(1) + '" x2="' + x.toFixed(1) + '" y2="' + y2.toFixed(1) + '" stroke="' + col + '" stroke-width="5" stroke-linecap="round" opacity="0.85"/>' +
      '<circle cx="' + x.toFixed(1) + '" cy="' + y1.toFixed(1) + '" r="4" fill="' + col + '"/>' +
      '<circle cx="' + x.toFixed(1) + '" cy="' + y2.toFixed(1) + '" r="4" fill="' + col + '" opacity="0.5"/>' +
      '<text x="' + x.toFixed(1) + '" y="' + (H - 4) + '" fill="#4a6080" font-size="10" text-anchor="middle" font-family="DM Sans,sans-serif">' + lbl + '</text>';
  }).join('');

  return '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + segs + '</svg>';
}

function svgWeekLine(wData, minAll, maxAll) {
  var n = wData.length;
  var W = Math.max(n * 70, 280);
  var H = C.H, pad = C.pad;
  var range = (maxAll - minAll) || 1;

  var pts = wData.map(function(w, i) {
    var x = pad + (i + 0.5) * ((W - pad * 2) / n);
    var y = w.avgT !== null ? H - 20 - ((w.avgT - minAll) / range) * (H - 20 - pad) : H / 2;
    return { x: x, y: y, type: w.type };
  });

  var path = pts.map(function(p, i) { return (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1); }).join(' ');

  var dots = pts.map(function(p, i) {
    var col = p.type === 'x' ? '#9b79f5' : p.type === 'm' ? '#0ddba8' : '#3d8ef8';
    var lbl = fmtShort(wData[i].wk);
    return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="5" fill="' + col + '"/>' +
      '<text x="' + p.x.toFixed(1) + '" y="' + (H - 4) + '" fill="#4a6080" font-size="9" text-anchor="middle" font-family="DM Sans,sans-serif">' + lbl + '</text>';
  }).join('');

  return '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="' + path + '" fill="none" stroke="#9b79f5" stroke-width="2" stroke-dasharray="5 3" stroke-linejoin="round" stroke-linecap="round"/>' +
    dots + '</svg>';
}

/* =============================================
   HTML HELPERS
============================================= */
function chartSec(title, svgHtml) {
  return '<div class="chart-sec"><div class="chart-heading">' + title + '</div><div class="chart-scroll">' + svgHtml + '</div></div>';
}

function tableSec(rowsHtml) {
  return '<div class="chart-sec">' + rowsHtml.join('') + '</div>';
}

function rowHtml(time, icon, r) {
  var temp = r.temp !== undefined ? Math.round(r.temp) + '°C' : '—';
  var wind = r.wind !== undefined ? r.wind.toFixed(1) + ' m/s' : '—';
  var prec = r.prec !== undefined ? r.prec.toFixed(1) + 'mm' : '—';
  return '<div class="drow">' +
    '<div class="drow-time">' + time + '</div>' +
    '<div class="drow-icon">' + icon + '</div>' +
    '<div class="drow-vals">' +
      '<div class="ms"><div class="ms-l">Temp</div><div class="ms-v">' + temp + '</div></div>' +
      '<div class="ms"><div class="ms-l">Wind</div><div class="ms-v">' + wind + '</div></div>' +
      '<div class="ms"><div class="ms-l">Rain</div><div class="ms-v">' + prec + '</div></div>' +
    '</div>' +
    '<div class="dot ' + r.type + '" style="flex-shrink:0;margin-left:6px"></div>' +
  '</div>';
}

function rowHtmlDay(time, icon, r) {
  return '<div class="drow">' +
    '<div class="drow-time">' + time + '</div>' +
    '<div class="drow-icon">' + icon + '</div>' +
    '<div class="drow-vals">' +
      '<div class="ms"><div class="ms-l">Temp</div><div class="ms-v">' + r.temp + '</div></div>' +
      '<div class="ms"><div class="ms-l">Wind</div><div class="ms-v">' + r.wind + '</div></div>' +
      '<div class="ms"><div class="ms-l">Rain</div><div class="ms-v">' + r.prec + '</div></div>' +
    '</div>' +
    '<div class="dot ' + r.type + '" style="flex-shrink:0;margin-left:6px"></div>' +
  '</div>';
}

function nodata() {
  return '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No data available</div></div>';
}

/* =============================================
   UTILITIES
============================================= */
function lastSnap(loc) {
  if (!loc.cache || !loc.cache.length) return null;
  return loc.cache[loc.cache.length - 1];
}

function latestTemp(loc) {
  var s = lastSnap(loc);
  if (!s || !s.rows || !s.rows.length) return null;
  var t = s.rows[0].temp;
  return t !== undefined ? Math.round(t) : null;
}

function weatherEmoji(loc) {
  var s = lastSnap(loc);
  if (!s || !s.rows || !s.rows.length) return '📍';
  return symEmoji(s.rows[0].sym);
}

function symEmoji(sym) {
  if (!sym) return '🌡️';
  if (sym.indexOf('clearsky') !== -1) return '☀️';
  if (sym.indexOf('fair') !== -1) return '🌤️';
  if (sym.indexOf('partlycloudy') !== -1) return '⛅';
  if (sym.indexOf('cloudy') !== -1) return '☁️';
  if (sym.indexOf('fog') !== -1) return '🌫️';
  if (sym.indexOf('thunder') !== -1) return '⛈️';
  if (sym.indexOf('snow') !== -1 || sym.indexOf('sleet') !== -1) return '❄️';
  if (sym.indexOf('rain') !== -1 || sym.indexOf('shower') !== -1) return '🌧️';
  return '🌡️';
}

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function fmtDay(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
}

function fmtShort(dateStr) {
  var d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function timeSince(ts) {
  var m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  var h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* =============================================
   TOAST
============================================= */
var _tt;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function() { el.classList.remove('show'); }, 3000);
}
</script>
